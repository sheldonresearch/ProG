name: CI

on:
  push:
    branches: [main, dev, 'refactor/**']
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: |
          if [ -f pyproject.toml ]; then
            ruff check .
          else
            echo "no pyproject.toml — skipping ruff check"
          fi
      - name: ruff format check
        run: |
          if [ -f pyproject.toml ]; then
            ruff format --check .
          else
            echo "no pyproject.toml — skipping ruff format check"
          fi

  import-smoke:
    name: Import smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          if [ -f pyproject.toml ]; then
            pip install -e .[dev]
          else
            pip install torch torch_geometric pandas openpyxl scikit-learn torchmetrics networkx "numpy<2" deprecated tqdm
          fi
      - name: Import prompt_graph
        run: |
          python -c "import prompt_graph; print('imports OK')"

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: [import-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          if [ -f pyproject.toml ]; then
            pip install -e .[dev]
          else
            pip install pytest torch torch_geometric pandas openpyxl scikit-learn torchmetrics networkx "numpy<2" deprecated tqdm
          fi
      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short -x
          else
            echo "no tests/ directory — skipping pytest"
          fi
