description: Plan A Cora follow-up — re-run NodeTask cells after induced_graph CUDA fix

environment:
  image: amlt-sing/acpt-torch2.8.x-py3.10-cuda12.6-ubuntu22.04
  setup:
    - python --version

code:
  local_dir: $CONFIG_DIR

target:
  service: sing
  name: Feeds
  workspace_name: CS-NewsAndFeeds-Singularity@rg-cs-newsandfeeds-singularity

jobs:
  - name: baseline-mix-cora
    sku: 80G1-A100
    sla_tier: Standard
    submit_args:
      env:
        AMLT_DOCKERFILE_TEMPLATE: DEFAULT
        _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/b6dc87f3-c479-49c8-8cb5-7896da3ff895/resourceGroups/AMLStudio/providers/Microsoft.ManagedIdentity/userAssignedIdentities/rankfun_aml
    command:
      - set -euo pipefail
      - export SHARD_NAME='baseline-mix-cora'
      - export PRETRAIN_METHODS='DGI GraphCL GraphMAE MultiGprompt'
      - export PRETRAIN_DATASETS='Cora'
      - export BENCH_PROMPTS='None MultiGprompt'
      - export BENCH_DATASETS='Cora'
      - export BENCH_PRETRAINS='None DGI GraphCL GraphMAE MultiGprompt'
      - export BENCH_SHOTS='1'
      - export BENCH_EXTRA_FLAGS=''
      - bash scripts/amlt_shard_run.sh
